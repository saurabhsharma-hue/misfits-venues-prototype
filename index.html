<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Misfits — Venues · Prototype</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#e7e3db" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Misfits" />
<link rel="apple-touch-icon" href="assets/icons/icon-180.png" />
<link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192.png" />
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('sw.js').catch(function () {});
    });
  }
</script>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet" />
<style>
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; }
  body{
    font-family:'Lato',system-ui,sans-serif;
    background:radial-gradient(1200px 800px at 50% -10%, #f3efe8 0%, #e7e3db 55%, #ddd9d0 100%);
    min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:26px 16px 48px; color:#2a2a2a;
  }
  .stage{ display:flex; flex-direction:column; align-items:center; gap:16px; }
  .brandline{ display:flex; align-items:center; gap:10px; opacity:.78; }
  .brandline img{ height:24px; }
  .brandline b{ font-weight:900; letter-spacing:.2px; color:#3a3a3a; font-size:15px; }

  /* iPhone 16 frame */
  .device{
    position:relative; width:402px; height:872px;
    background:#0b0b0d; border-radius:62px; padding:13px;
    box-shadow:0 0 0 2px #2a2a2e, 0 30px 60px -12px rgba(0,0,0,.45), 0 8px 18px rgba(0,0,0,.3);
  }
  .device::after{ content:""; position:absolute; left:-3px; top:172px; width:3px; height:62px; background:#222; border-radius:3px; box-shadow:0 94px 0 #222, 0 172px 0 #222; }
  .device::before{ content:""; position:absolute; right:-3px; top:212px; width:3px; height:92px; background:#222; border-radius:3px; }
  .screen-wrap{ position:relative; width:100%; height:100%; background:#FAF9F7; border-radius:50px; overflow:hidden; }
  iframe.app{ width:100%; height:100%; border:0; display:block; background:#FAF9F7; }

  .controls{ display:flex; gap:10px; align-items:center; }
  .reset{ background:rgba(0,0,0,.06); border:1px solid rgba(0,0,0,.08); color:#444; border-radius:99px; padding:8px 16px; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; }
  .reset:hover{ background:rgba(0,0,0,.1); }
  .hint{ font-size:12.5px; color:#7a7770; }

  /* ---- Phone: keep the iPhone frame at its fixed size and scale the whole
         unit (via JS transform) to fit the screen — the app renders at the
         exact desktop width so nothing reflows or distorts. ---- */
  @media (max-width: 600px) {
    html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
    html, body { height: 100%; overflow: hidden; }
    body { padding: 0; min-height: 100dvh; }
    .brandline, .controls { display: none; }
    .stage { gap: 0; height: 100dvh; justify-content: center; }
    .device { transform-origin: center center; }
    .device::before, .device::after { display: none; }
  }
</style>
<script>
  /* Scale the fixed 402x872 frame to fit the phone viewport. */
  (function () {
    function fit() {
      var d = document.querySelector('.device');
      if (!d) return;
      if (window.innerWidth > 600) { d.style.transform = ''; return; }
      var s = Math.min(window.innerWidth / 402, window.innerHeight / 872) * 0.97;
      d.style.transform = 'scale(' + s + ')';
    }
    ['DOMContentLoaded', 'load', 'resize', 'orientationchange'].forEach(function (ev) {
      window.addEventListener(ev, fit);
    });
    // also after fonts/layout settle
    setTimeout(fit, 50); setTimeout(fit, 400);
  })();
</script>
</head>
<body>
  <div class="stage">
    <div class="brandline">
      <img src="assets/app_logo_colored.svg" alt="Misfits" onerror="this.style.display='none'" />
      <b>Venues</b>
    </div>
    <div class="device">
      <div class="screen-wrap">
        <iframe class="app" id="app" src="app.html" title="Misfits Venues prototype"></iframe>
      </div>
    </div>
    <div class="controls">
      <button class="reset" onclick="document.getElementById('app').contentWindow.go('decision')">⟲ Restart</button>
      <span class="hint">Tap inside the phone to navigate the real screens.</span>
    </div>
  </div>
</body>
</html>
